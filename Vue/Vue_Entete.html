<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Nom Prénom</title> <!-- Titre de la page -->
    <style>
        /* Styles généraux pour le header */
        header {
            background-color: #2c3e50; /* Bleu foncé élégant */
            color: #ecf0f1;           /* Texte clair */
            padding: 0px 0px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-family: 'Arial', sans-serif;
        }

        /* Titre du site */
        header h1 {
            margin: 0;
            font-size: 2em;
            letter-spacing: 1px;
        }

        /* Menu de navigation */
        header nav {
            margin-top: 15px;
        }

        header nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Effet hover : souligné animé */
        header nav a::after {
            content: '';
            display: block;
            height: 2px;
            width: 0;
            background: #e74c3c; /* Rouge pour le survol */
            transition: width 0.3s;
            position: absolute;
            bottom: -5px;
            left: 0;
        }

        header nav a:hover::after {
            width: 100%;
        }

        /* Ligne horizontale décorative */
        header hr {
            width: 80%;
            margin-top: 15px;
            border: 0;
            border-top: 2px solid #34495e;
        }

        /* Responsive : menu centré sur mobile */
        @media (max-width: 600px) {
            header {
                padding: 15px 20px;
            }

            header nav a {
                margin: 0 10px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="#accueil" id="lienAccueil">Accueil</a>
        <a href="#contact" id="lienContact">Contact</a>
    </nav>
    <hr>
</header>

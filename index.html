<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bienvenue</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #fff;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        h1 {
            font-size: 2.5em;
            margin: 0;
            animation: fadeIn 1s ease-in-out;
        }

        p {
            font-size: 1.2em;
            margin: 20px 0;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        #app {
            display: none; /* Caché jusqu’au clic */
        }

        /* Styles pour le portfolio après le clic */
        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            position: relative;
        }
        nav a::after {
            content: '';
            display: block;
            height: 2px;
            width: 0;
            background: #e74c3c;
            position: absolute;
            bottom: -5px;
            left: 0;
            transition: width 0.3s;
        }
        nav a:hover::after {
            width: 100%;
        }
        #app {
            padding: 40px;
            max-width: 800px;
            margin: auto;
        }
    </style>
</head>
<body>

<h1>Bienvenue sur mon Portfolio !</h1>
<p>Cliquez n'importe où pour commencer</p>

<div id="app"></div> <!-- Contenu chargé par les contrôleurs -->

<!-- Inclusion des contrôleurs JS -->
<script src="./controleur/controleur_accueil.js"></script>
<script src="./controleur/controleur_contact.js"></script>

<script>
    // Au clic n'importe où, on affiche le portfolio et charge l'accueil
    document.body.addEventListener('click', () => {
        // Masquer le message de bienvenue
        document.querySelector('h1').style.display = 'none';
        document.querySelector('p').style.display = 'none';

        // Afficher l'app
        document.getElementById('app').style.display = 'block';

        // Créer le header du portfolio
        const header = document.createElement('header');
        header.innerHTML = `
            <h1>Mon Portfolio</h1>
            <nav>
                <a href="#" id="lienAccueil">Accueil</a>
                <a href="#" id="lienContact">Contact</a>
            </nav>
        `;
        document.body.insertBefore(header, document.getElementById('app'));

        // Gestion des clics du menu
        document.getElementById('lienAccueil').addEventListener('click', e => {
            e.preventDefault();
            controleurAccueil();
        });
        document.getElementById('lienContact').addEventListener('click', e => {
            e.preventDefault();
            controleurContact();
        });

        // Charge l'accueil par défaut
        controleurAccueil();
    });
</script>

</body>
</html>

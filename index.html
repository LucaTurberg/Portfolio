<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vue Tabs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2em;
  cursor: pointer;
}

.tabcontent {
  display: none;
  padding: 80px;
  text-align: center;
  min-height: 100vh;
}

#Accueil { background: red; }
#Contact { background: blue; }

</style>
</head>

<body>

<div id="startScreen" onclick="startApp()">
  Cliquez n'importe où pour commencer
</div>

<div id="site" style="display:none;">

  <!-- 🔥 composant Vue header -->
  <div id="header"></div>

  <!-- pages -->
  <div id="Accueil" class="tabcontent">
    <h3>Accueil</h3>
    <p>Bienvenue sur la page d'accueil</p>
  </div>

  <div id="Contact" class="tabcontent">
    <h3>Contact</h3>
    <p>Contacte-nous ici</p>
  </div>

</div>

<script>

// 🔥 charger composant Vue_Entete.html
fetch("Vue/Vue_Entete.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("header").innerHTML = html;
  });

// 🔥 start app
function startApp() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("site").style.display = "block";

  openTab("Accueil", false);
  history.replaceState(null, "", "#Accueil");
}

// 🔥 tabs
function openTab(name, updateUrl = true) {
  let tabs = document.getElementsByClassName("tabcontent");

  for (let i = 0; i < tabs.length; i++) {
    tabs[i].style.display = "none";
  }

  document.getElementById(name).style.display = "block";

  if (updateUrl) {
    history.replaceState(null, "", "#" + name);
  }
}

// 🔥 reload support
window.onload = function () {
  let tab = window.location.hash.replace("#", "");

  if (tab) {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("site").style.display = "block";
    openTab(tab, false);
  }
};

</script>

</body>
</html>

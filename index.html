<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Nom Prénom</title>
</head>
<body>

<header>
    <h1>Mon Portfolio</h1>
    <nav>
        <a href="#accueil" id="lienAccueil">Accueil</a>
        <a href="#contact" id="lienContact">Contact</a>
    </nav>
    <hr>
</header>

<div id="app"></div>

<!-- Inclusion directe des contrôleurs -->
<script src="./controleur/controleur_accueil.js"></script>
<script src="./controleur/controleur_contact.js"></script>

<script>
    // Au clic sur Accueil
    document.getElementById('lienAccueil').addEventListener('click', (e) => {
        e.preventDefault();
        controleurAccueil(); // Fonction définie dans controleur_accueil.js
    });

    // Au clic sur Contact
    document.getElementById('lienContact').addEventListener('click', (e) => {
        e.preventDefault();
        controleurContact(); // Fonction définie dans controleur_contact.js
    });

    // Charge la page d'accueil par défaut
    controleurAccueil();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MVC Tabs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2em;
  cursor: pointer;
}

#content {
  padding-top: 50px;
}

.tabcontent {
  padding: 80px;
  min-height: 100vh;
}

#Accueil { background: red; }
#Contact { background: blue; }

</style>
</head>

<body>

<div id="startScreen" onclick="startApp()">
  Cliquez n'importe où pour commencer
</div>

<div id="app" style="display:none;">

  <!-- HEADER (injecté par contrôleur) -->
  <div id="header"></div>

  <!-- CONTENU -->
  <div id="content"></div>

</div>

<script src="Controleur/Controleur_Accueil.js"></script>

</body>
</html>

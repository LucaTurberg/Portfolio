<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Site Tabs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2em;
  cursor: pointer;
}

.tabbar {
  display: flex;
  width: 100%;
}

.tablink {
  flex: 1;
  background: #555;
  color: white;
  border: none;
  padding: 15px;
  cursor: pointer;
  font-size: 16px;
}

.tablink:hover {
  background: #777;
}

.tabcontent {
  display: none;
  padding: 80px;
  text-align: center;
  min-height: calc(100vh - 60px);
}

#Accueil { background: red; }
#Contact { background: blue; }

</style>
</head>

<body>

<div id="startScreen" onclick="startApp()">
  Cliquez n'importe où pour commencer
</div>

<div id="site" style="display:none;">

  <div class="tabbar">
    <button class="tablink" onclick="openTab('Accueil')">Accueil</button>
    <button class="tablink" onclick="openTab('Contact')">Contact</button>
  </div>

  <div id="Accueil" class="tabcontent">
    <h3>Accueil</h3>
    <p>Bienvenue sur la page d'accueil</p>
  </div>

  <div id="Contact" class="tabcontent">
    <h3>Contact</h3>
    <p>Contacte-nous ici</p>
  </div>

</div>

<script>

function startApp() {
  // 🔥 1. on met direct le hash AVANT affichage
  window.location.hash = "Accueil";

  // 🔥 2. on affiche le site
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("site").style.display = "block";

  // 🔥 3. ouverture tab accueil
  openTab("Accueil", false);
}

function openTab(name, updateUrl = true) {
  let tabs = document.getElementsByClassName("tabcontent");

  for (let i = 0; i < tabs.length; i++) {
    tabs[i].style.display = "none";
  }

  document.getElementById(name).style.display = "block";

  // mise à jour URL quand clic sur tab
  if (updateUrl) {
    window.location.hash = name;
  }
}

// si on arrive direct avec #Accueil
window.onload = function () {
  let tab = window.location.hash.replace("#", "");

  if (tab) {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("site").style.display = "block";
    openTab(tab, false);
  }
};

</script>

</body>
</html>

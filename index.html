<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bienvenue</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f4f4f4;
            color: #2c3e50;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
        }
        #countdown {
            font-weight: bold;
            font-size: 2em;
            color: #e74c3c;
        }
    </style>
</head>
<body>

<h1>Bienvenue sur mon Portfolio !</h1>
<p>Vous allez être redirigé vers la page d'accueil dans <span id="countdown">5</span> secondes...</p>

<script>
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');

    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(interval);
            // Redirection vers le contrôleur accueil
            window.location.href = './controleur/controleur_accueil.html';
        }
    }, 1000);
</script>

</body>
</html>
